services:
  db:
    image: postgres:16-alpine
    container_name: prontoerp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prontoerp
      POSTGRES_USER: prontoerp
      POSTGRES_PASSWORD: prontoerp
    ports:
      - "5432:5432"
    volumes:
      - prontoerp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prontoerp -d prontoerp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: prontoerp-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  prontoerp_pgdata:
