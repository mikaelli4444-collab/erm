<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Builder</title>

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-dark: #4338ca;
            --background-color: #f9fafb;
            --card-background: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #d1d5db;
            --error-color: #ef4444;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            --font-family-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
        }

        body {
            margin: 0;
            font-family: var(--font-family-body);
            background: var(--background-color);
            color: var(--text-primary);
        }

        .container {
            max-width: 850px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: var(--card-background);
            padding: 22px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 18px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .card-form {
            padding: 32px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-top: 12px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            margin-bottom: 12px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary-color);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            align-items: start;
        }

        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .dropzone {
            border: 2px dashed #c7d2fe;
            background: #f8faff;
            padding: 18px;
            text-align: center;
            border-radius: var(--radius-lg);
            cursor: pointer;
        }

        .dropzone:hover {
            border-color: var(--primary-color);
            background: #eef2ff;
        }

        .image-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .image-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .remove-img {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            background: var(--error-color);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .pdf-item {
            font-size: 0.85rem;
            padding: 8px 10px;
            background: #eef2ff;
            border-radius: 8px;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pdf-item button {
            width: 22px;
            height: 22px;
            background: var(--error-color);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            background: #fafafa;
            font-size: 0.9rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s ease;
        }

        .file-button:hover {
            background: #f5f7ff;
            border-color: var(--primary-color);
        }

        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

#carpenterResults {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    z-index: 9999;
    background: white;
    border: 1px solid #ccc;
    max-height: 150px;
    overflow-y: auto;
}

.grid > div {
    position: relative;
}

#carpenterResults div {
    padding: 8px;
    cursor: pointer;
}

#carpenterResults div:hover {
    background: #eee;
}

#carpenterResults:empty {
    display: none;
}
    </style>
</head>

<body>

<form action="/projects/add" method="post" enctype="multipart/form-data">
    <div class="container">
        <h1>Project Builder</h1>

        <div class="card">
            <h3>Imágenes del proyecto</h3>
            <div class="dropzone" id="dropzone">
                <p>Arrastra imágenes aquí o haz click</p>
                <input type="file" id="imagesInput" name="photo" multiple accept="image/*" hidden>
            </div>
            <div class="image-grid" id="imageGrid"></div>
        </div>

        <div class="card">
            <h3>Documentos PDF</h3>
            <button type="button" class="file-button" id="pdfButton">Seleccionar PDFs</button>
            <input type="file" id="pdfInput" name="pdf" multiple accept="application/pdf" hidden>
            <div id="pdfList"></div>
        </div>

        <div class="card card-form">
            <h3>Datos del proyecto</h3>

            <div class="grid">
                <div>
                    <label>Nombre</label>
                    <input type="text" name="name">
                </div>

                <div>
                    <label>Marceneiro</label>
                    <input type="text" name="carpenter" id="carpenterInput">
                    <input type="hidden" name="carpenter_id" id="carpenterId">
                    <div id="carpenterResults"></div>
                </div>

                <div>
                    <label>Cliente</label>
                    <input type="text" name="client_name">
                </div>

                <div>
                    <label>Arquitecto</label>
                    <input type="text" name="architect">
                </div>

                <div>
                    <label>Fecha entrega</label>
                    <input type="date" name="delivery">
                </div>

                <div style="grid-column: span 2;">
                    <label>Dirección</label>
                    <input type="text" name="address">
                </div>
            </div>

            <label>Materiales</label>
            <textarea name="materials"></textarea>

            <label>Descripción</label>
            <textarea name="description"></textarea>

            <button class="btn-submit">Guardar proyecto</button>
        </div>
    </div>
</form>

<script>
const dropzone = document.getElementById("dropzone");
const imageInput = document.getElementById("imagesInput");
const imageGrid = document.getElementById("imageGrid");
const pdfInput = document.getElementById("pdfInput");
const pdfList = document.getElementById("pdfList");
const pdfButton = document.getElementById("pdfButton");

let images = [];
let pdfs = [];

pdfButton.addEventListener("click", () => pdfInput.click());
dropzone.addEventListener("click", () => imageInput.click());

dropzone.addEventListener("dragover", e => e.preventDefault());

dropzone.addEventListener("drop", e => {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
});

imageInput.addEventListener("change", e => {
    handleFiles(e.target.files);
});

function handleFiles(files) {
    [...files].forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            images.push(e.target.result);
            renderImages();
        };
        reader.readAsDataURL(file);
    });
}

function renderImages() {
    imageGrid.innerHTML = "";
    images.forEach((img, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "image-wrapper";
        const image = document.createElement("img");
        image.src = img;
        const btn = document.createElement("button");
        btn.className = "remove-img";
        btn.innerHTML = "×";
        btn.onclick = () => {
            images.splice(index, 1);
            renderImages();
        };
        wrapper.appendChild(image);
        wrapper.appendChild(btn);
        imageGrid.appendChild(wrapper);
    });
}

pdfInput.addEventListener("change", e => {
    const files = [...e.target.files];
    files.forEach(file => pdfs.push(file.name));
    renderPDFs();
});

function renderPDFs() {
    pdfList.innerHTML = "";
    pdfs.forEach((pdf, index) => {
        const div = document.createElement("div");
        div.className = "pdf-item";
        const name = document.createElement("span");
        name.textContent = pdf;
        const btn = document.createElement("button");
        btn.innerHTML = "×";
        btn.onclick = () => {
            pdfs.splice(index, 1);
            renderPDFs();
        };
        div.appendChild(name);
        div.appendChild(btn);
        pdfList.appendChild(div);
    });
}

const carpenterInput = document.getElementById("carpenterInput");
const carpenterIdInput = document.getElementById("carpenterId");
const carpenterResults = document.getElementById("carpenterResults");

let timeout = null;

carpenterInput.addEventListener("input", () => {
    const query = carpenterInput.value.trim();

    carpenterIdInput.value = "";

    if (query.length < 2) {
        carpenterResults.innerHTML = "";
        return;
    }

    clearTimeout(timeout);

    timeout = setTimeout(async () => {
        try {
            const res = await fetch(`/projects/users/search?username=${query}`);
            const data = await res.json();

            carpenterResults.innerHTML = "";

            data.forEach(user => {
                const div = document.createElement("div");
                div.textContent = user.name;

                div.onclick = () => {
                    carpenterInput.value = user.name;
                    carpenterIdInput.value = user.id;
                    carpenterResults.innerHTML = "";
                };

                carpenterResults.appendChild(div);
            });

        } catch (err) {
            console.error(err);
        }
    }, 300);
});
</script>

</body>
</html>
