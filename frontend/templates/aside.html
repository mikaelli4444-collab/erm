<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Component</title>

    <style>
        /* =========================================================
   VARIABLES Y CONFIGURACIÓN BASE
   ========================================================= */
        :root {
            --bg-page: #f2f4f7;
            --bg-main: #ffffff;
            --border: #d0d7de;
            --text-main: #1f2328;
            --text-muted: #6e7781;
            --blue: #1e40af;
            --blue-hover: #1e3a8a;
            --red: #dc2626;
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-page);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* =========================================================
   SIDEBAR
   ========================================================= */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            z-index: 1000;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar-header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
            padding: 0;
        }

        .app-icon {
            font-size: 24px;
        }

        .sidebar.collapsed .app-icon {
            display: none;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
        }

        /* =========================================================
   NAVEGACIÓN
   ========================================================= */
        .sidebar-nav {
            padding: 10px 12px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #e7edff;
            color: var(--blue);
        }

        .nav-item .icon {
            width: 24px;
            font-size: 20px;
            display: flex;
            justify-content: center;
        }

        .sidebar.collapsed .nav-item .label {
            display: none;
        }

        /* =========================================================
   FOOTER
   ========================================================= */
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .logout-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--red);
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 500;
        }

        .sidebar.collapsed .logout-link span:not(.icon) {
            display: none;
        }

        .logout-link:hover {
            background: #ffeeee;
        }

        @media (max-width: 900px) {
            body {
                display: block;
            }

            .sidebar {
                position: fixed;
                top: 12px;
                right: 12px;
                left: auto;
                width: 52px;
                height: 52px;
                max-height: calc(100dvh - 24px);
                overflow: hidden;
                background: #fff;
                border: 1px solid var(--border);
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
                transition: width 0.2s ease, height 0.2s ease, box-shadow 0.2s ease;
                z-index: 2000;
            }

            .sidebar.collapsed {
                width: min(260px, calc(100vw - 24px));
                height: auto;
                border-radius: 12px;
                box-shadow: 0 16px 40px rgba(15, 23, 42, 0.14);
            }

            .sidebar-header {
                height: 52px;
                padding: 0;
                justify-content: center;
                gap: 12px;
            }

            .sidebar.collapsed .sidebar-header {
                justify-content: space-between;
                padding: 0 0 0 16px;
            }

            .app-icon,
            .sidebar-nav,
            .sidebar-footer {
                display: none;
            }

            .sidebar.collapsed .app-icon {
                display: block;
                min-width: 0;
                font-size: 16px;
                white-space: nowrap;
            }

            .toggle-btn {
                width: 52px;
                height: 52px;
                min-width: 52px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-main);
            }

            .sidebar.collapsed .sidebar-nav {
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding: 8px;
                flex: none;
            }

            .sidebar.collapsed .nav-item {
                width: 100%;
                margin-bottom: 0;
                white-space: normal;
            }

            .sidebar.collapsed .nav-item .label,
            .sidebar.collapsed .logout-link span:not(.icon) {
                display: inline;
            }

            .sidebar.collapsed .sidebar-footer {
                display: block;
                padding: 8px;
                border-top: 1px solid var(--border);
            }

            .sidebar.collapsed .logout-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-icon"><strong>ProntoERP</strong></div>
            <button class="toggle-btn" type="button" aria-label="Toggle menu" aria-expanded="false" onclick="toggleSidebar()">☰</button>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item {% if '/inv/dashboard' in request.url.path %}active{% endif %}" href="/inv/dashboard">
                <span class="icon">📊</span>
                <span class="label">Painel</span>
            </a>

            <a class="nav-item {% if '/production' in request.url.path %}active{% endif %}" href="/production">
                <span class="icon">🏭</span>
                <span class="label">Produção</span>
            </a>

            <a class="nav-item {% if '/ctc' in request.url.path %}active{% endif %}" href="/ctc">
                <span class="icon">👥</span>
                <span class="label">Contatos</span>
            </a>

            <a class="nav-item {% if '/projects' in request.url.path %}active{% endif %}" href="/projects/dashboard">
                <span class="icon">📁</span>
                <span class="label">Projetos</span>
            </a>

            <a class="nav-item {% if '/time-tracking' in request.url.path %}active{% endif %}" href="/time-tracking/dashboard">
                <span class="icon">T</span>
                <span class="label">Horas</span>
            </a>

            <a class="nav-item {% if '/financery' in request.url.path %}active{% endif %}" href="/financery/dashboard">
                <span class="icon">💵</span>
                <span class="label">Financeiro</span>
            </a>
            
            <a class="nav-item {% if '/schedule' in request.url.path %}active{% endif %}" href="/schedule">
                <span class="icon">📆</span>
                <span class="label">Cronograma</span>
            </a>
        </nav>

        

        <div class="sidebar-footer">
            <a class="logout-link" href="/home/login">
                🚪 <span>Sair</span>
            </a>
        </div>
    </aside>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const button = sidebar.querySelector('.toggle-btn');
            const isCollapsed = sidebar.classList.toggle('collapsed');
            const isMobile = window.matchMedia('(max-width: 900px)').matches;
            button.setAttribute('aria-expanded', String(isMobile ? isCollapsed : !isCollapsed));
        }
    </script>

</body>

</html>
