<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#111827;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            padding:20px;
        }

        .card{
            background:#1f2937;
            padding:50px;
            border-radius:16px;
            text-align:center;
            max-width:500px;
            width:100%;
            box-shadow:0 15px 40px rgba(0,0,0,.35);
        }

        h1{
            font-size:90px;
            margin-bottom:10px;
            color:#60a5fa;
        }

        h2{
            margin-bottom:15px;
            font-size:28px;
        }

        p{
            color:#cbd5e1;
            line-height:1.6;
            margin-bottom:30px;
        }

        a{
            display:inline-block;
            padding:12px 24px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:.2s;
        }

        a:hover{
            background:#1d4ed8;
        }

        .small{
            margin-top:25px;
            font-size:14px;
            color:#94a3b8;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>404</h1>

        <h2>Não existe nada aqui</h2>

        <p>
            O lugar que está tentando visitar não existe, foi modificado ou apagado
            Tente procurar em outro lugar
        </p>

        <a href="https://ooze-crave-yam.ngrok-free.dev/">
            Voltar
        </a>

        <div class="small">
            Error 404 • ProntoERP
        </div>

    </div>

</body>
</html>
