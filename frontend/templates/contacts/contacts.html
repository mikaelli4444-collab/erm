<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contactos</title>
    <link rel="stylesheet" href="/static/contacts/contacts.css?v=999">
    <script type="module" src="/static/js/refresh_token.js"></script>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-icon">🥵🥵🥵🥵🥵</div>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" href="/inv/dashboard">
                <span class="icon">📊</span>
                <span class="label">Dashboard</span>
            </a>

            <a class="nav-item" href="/production">
                <span class="icon">🏭</span>
                <span class="label">Production</span>
            </a>

            <a class="nav-item active" href="/ctc">
                <span class="icon">👥</span>
                <span class="label">Contacts</span>
            </a>

            <a class="nav-item" href="/projects">
                <span class="icon">📁</span>
                <span class="label">Projects</span>
            </a>

            <a class="nav-item" href="/financery">
                <span class="icon">💵</span>
                <span class="label">Financery</span>
            </a>

        </nav>

        <div class="sidebar-footer">
            <a class="logout-link" href="/home/login">🚪 Sign Out</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>📇 Contacts</h1>

            <button id="add-contact-btn" class="add-btn">
                 New Contact
            </button>
        </div>

        <form method="post" action="/ctc/add" class="add-contact-form hidden">

            <div class="form-row">
                <input type="text" name="name" placeholder="Nombre" required>

                <input type="email" name="email" placeholder="Email (opcional)">
            </div>

            <div class="form-row">
                <input type="text" name="phone" placeholder="Teléfono" required>

                <select name="type" required>
                    <option value="">Tipo</option>
                    <option value="client">Client</option>
                    <option value="architect">Architech</option>
                    <option value="personal">Personal</option>
                    <option value="employed">Employed</option>
                </select>
            </div>

            <button type="submit">Save Contact</button>

        </form>

        <form method="get">
            <input type="text" name="q" placeholder="Search by name, email or phone" value="{{ q or '' }}">

            <select name="contact_type">
                <option value="">All</option>
                <option value="cliente" {% if contact_type=="client" %}selected{% endif %}>
                    Client
                </option>
                <option value="arquitecto" {% if contact_type=="architech" %}selected{% endif %}>
                    Architect
                </option>
                <option value="arquitecto" {% if contact_type=="phone" %}selected{% endif %}>
                    Phone
                </option>
            </select>

            <button type="submit">Search</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Job Title</th>
                </tr>
            </thead>
            <tbody>
                {% if contacts %}
                {% for c in contacts %}
                <tr>
                    <td>{{ c.name }}</td>
                    <td>{{ c.email }}</td>
                    <td>{{ c.phone }}</td>
                    <td>
                        <span class="badge {{ c.type }}">
                            {{ c.type.capitalize() }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
                {% else %}
                <tr>
                    <td colspan="6" class="empty">
                        Not results found
                    </td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        const addBtn = document.getElementById('add-contact-btn');
        const addForm = document.querySelector('.add-contact-form');

        addBtn.addEventListener('click', () => {
            addForm.classList.toggle('hidden');
        });
    </script>
</body>

</html>
