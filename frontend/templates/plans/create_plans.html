<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin Plans</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f4f4;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            background: black;
            color: white;
            border: none;
            margin-top: 10px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #222;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Crear Plan</h2>

    <input
        id="name"
        placeholder="Nombre"
    >

    <input
        id="amount"
        type="number"
        step="0.01"
        min="0"
        placeholder="49.90"
    >

    <select id="frequency">
        <option value="1">Mensual</option>
        <option value="12">Anual</option>
    </select>

    <button onclick="createPlan()">
        Crear
    </button>

    <hr>

    <h2>Planes existentes</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Frecuencia</th>
                <th>Acción</th>
            </tr>
        </thead>

        <tbody>

        {% for plan in planes %}

        <tr>

            <td>
                {{ plan.id }}
            </td>

            <td>
                <input
                    value="{{ plan.name }}"
                    id="name-{{ plan.id }}"
                >
            </td>

            <td>
                <input
                    value="{{ plan.amount / 100 }}"
                    id="amount-{{ plan.id }}"
                    type="number"
                    step="0.01"
                    min="0"
                >
            </td>

            <td>

                <select id="freq-{{ plan.id }}">

                    <option
                        value="1"
                        {% if plan.frequency == 1 %}selected{% endif %}
                    >
                        Mensual
                    </option>

                    <option
                        value="12"
                        {% if plan.frequency == 12 %}selected{% endif %}
                    >
                        Anual
                    </option>

                </select>

            </td>

            <td>

                <button onclick="updatePlan({{ plan.id }})">
                    Guardar
                </button>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

<script>

async function createPlan() {

    try {

        const payload = {
            name: document.getElementById("name").value,
            amount: parseFloat(document.getElementById("amount").value),
            frequency: parseInt(document.getElementById("frequency").value)
        };

        const res = await fetch("/admin/create-plan", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            alert("Error creando plan");
            return;
        }

        window.location.reload();

    } catch (err) {
        console.error(err);
    }

}

async function updatePlan(id) {

    try {

        const payload = {
            name: document.getElementById(`name-${id}`).value,
            amount: parseFloat(document.getElementById(`amount-${id}`).value),
            frequency: parseInt(document.getElementById(`freq-${id}`).value)
        };

        const res = await fetch(`/admin/update-plan/${id}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            alert("Error actualizando");
            return;
        }

        window.location.reload();

    } catch (err) {
        console.error(err);
    }

}

</script>

</body>
</html>
