<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar | ERM System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Link to CSS file (Make sure the path is correct in your project) -->
    <link rel="stylesheet" href="../../static/signup.css">
</head>

<body>

    <div class="signup-container">
        <div class="signup-header">
            <h1>Criar conta</h1>
            <p>Junte-se ao sistema ERM hoje</p>
        </div>

        {% if message %}
        <div
            class="alert {% if 'error' in message.lower() or 'exists' in message.lower() %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        <form action="/home/signup" method="POST">

            <div class="form-group">
                <label for="fullname">Nome completo</label>
                <input type="text" id="fullname" name="fullname" placeholder="Ex: João da Silva" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Mínimo de 8 caracteres" required
                        minlength="8">
                    <button type="button" class="toggle-password" id="toggleBtn">
                        <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" id="eyeIcon" alt="Show">
                    </button>
                </div>
            </div>

            <!-- NUEVO CAMPO -->
            <div class="form-group">
                <label for="company">Empresa que deseja entrar</label>
                <input type="text" id="company" name="company" placeholder="Nome da empresa">
            </div>

            <button type="submit" class="btn-signup">Cadastrar</button>

        </form>


        <div class="footer-links">
            <p>Já tem uma conta? <a href="/home/login">Entrar</a></p>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggleBtn');
        const eyeIcon = document.getElementById('eyeIcon');

        const iconView = "https://cdn-icons-png.flaticon.com/512/709/709612.png";
        const iconHide = "https://cdn-icons-png.flaticon.com/512/2767/2767146.png";

        toggleBtn.addEventListener('click', function () {
            const isSenha = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isSenha ? 'text' : 'password');
            eyeIcon.src = isSenha ? iconHide : iconView;
        });
    </script>
    {% include 'loading.html' %}
</body>

</html>
