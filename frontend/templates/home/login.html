<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ProntoERP</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/login.css">
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <h1>ProntoERP</h1>
            <p>Gerencie suas entidades com eficiência</p>
        </div>

        <!-- Dynamic notification from FastAPI -->
        {% if message %}
        <div
            class="alert {% if 'error' in message.lower( ) or 'incorrect' in message.lower() %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        <form action="/home/login" method="POST">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Seu usuário" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="toggleBtn">
                        <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" id="eyeIcon"
                            alt="Show password">
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="footer-links">
            <p>Não tem uma conta? <a href="/home/signup">Cadastre-se aqui</a></p>
            <p>Esqueceu a senha? <a href="/home/forgot_password">Redefina aqui</a></p>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggleBtn');
        const eyeIcon = document.getElementById('eyeIcon');

        // Define image links
        const iconView = "https://cdn-icons-png.flaticon.com/512/709/709612.png";
        const iconHide = "https://cdn-icons-png.flaticon.com/512/2767/2767146.png";

        toggleBtn.addEventListener('click', function () {
            const isSenha = passwordInput.getAttribute('type') === 'password';

            // Change input type
            passwordInput.setAttribute('type', isSenha ? 'text' : 'password');

            // Change image source
            eyeIcon.src = isSenha ? iconHide : iconView;
        });
    </script>
{% include 'loading.html' %}
</body>

</html>
