<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ERM System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../static/login.css">
</head>

<body>

    <div class="login-container">

        <div class="login-header">
            <h1>ERM System</h1>
            <p>Gerencie suas entidades com eficiência</p>
        </div>

        {% if message %}
        <div
            class="alert {% if 'error' in message.lower() or 'incorrect' in message.lower() %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        <!-- STEP 1 -->
        <form action="/home/forgot-password" method="POST">

            <div class="form-group">
                <label for="username">Usuário ou e-mail</label>
                <input type="text"
                    id="username"
                    name="username"
                    placeholder="Seu usuário ou e-mail"
                    required>
            </div>

            <label for="password">Nova senha</label>

            <div class="password-wrapper">

                <input type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required>

                <button type="button"
                    class="toggle-password"
                    id="togglePasswordBtn">

                    <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png"
                        id="passwordEyeIcon"
                        alt="Show password">

                </button>

            </div>

            <br>

            <label for="confirm_password">Confirmar senha</label>

            <div class="password-wrapper">

                <input type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="••••••••"
                    required>

                <button type="button"
                    class="toggle-password"
                    id="toggleConfirmBtn">

                    <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png"
                        id="confirmEyeIcon"
                        alt="Show password">

                </button>

            </div>

            <br>

            <button type="submit" class="btn-login">
                Redefinir senha
            </button>

        </form>

        <div class="footer-links">
            <p>
                Não tem uma conta?
                <a href="/home/signup">Cadastre-se aqui</a>
            </p>

            <p>
                Lembrou sua senha?
                <a href="/home/login">Entrar aqui</a>
            </p>
        </div>

    </div>

    <script>

        const iconView = "https://cdn-icons-png.flaticon.com/512/709/709612.png";
        const iconHide = "https://cdn-icons-png.flaticon.com/512/2767/2767146.png";

        function setupToggle(buttonId, inputId, iconId) {

            const button = document.getElementById(buttonId);
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            button.addEventListener('click', function () {

                const isPassword = input.type === 'password';

                input.type = isPassword ? 'text' : 'password';

                icon.src = isPassword ? iconHide : iconView;

            });

        }

        setupToggle(
            "togglePasswordBtn",
            "password",
            "passwordEyeIcon"
        );

        setupToggle(
            "toggleConfirmBtn",
            "confirm_password",
            "confirmEyeIcon"
        );

    </script>

</body>

</html>
