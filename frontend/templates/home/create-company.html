<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar empresa | ERM System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/signup.css">
</head>

<body>

    <div class="signup-container">
        <div class="signup-header">
            <h1>Criar empresa</h1>
            <p>Cadastre sua empresa no sistema ERM</p>
        </div>

        {% if message %}
        <div
            class="alert {% if 'error' in message.lower() or 'exists' in message.lower() %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        <form action="/home/create-company" method="POST">

            <div class="form-group">
                <label for="name">Nome da empresa</label>
                <input type="text" id="name" name="company_name" placeholder="Ex: Soluções Tech" required>
            </div>

            <div class="form-group">
                <label for="legal_name">Razão social</label>
                <input type="text" id="legal_name" name="legal_name" placeholder="Ex: Soluções Tech LTDA" required>
            </div>

            <div class="form-group">
                <label for="tax_id">CNPJ</label>
                <input type="text" id="tax_id" name="tax_id" placeholder="00.000.000/0001-00" maxlength="18" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail da empresa</label>
                <input type="email" id="email" name="email" placeholder="empresa@exemplo.com" required>
            </div>

            <button type="submit" class="btn-signup">Criar empresa</button>

        </form>

        <div class="footer-links">
            <p>Já tem uma empresa? <a href="/home/login">Entrar</a></p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cnpjInput = document.getElementById("tax_id");

            cnpjInput.addEventListener("input", (e) => {
                let value = e.target.value.replace(/\D/g, "");

                // Limita a 14 dígitos
                value = value.substring(0, 14);

                // Aplica máscara
                value = value.replace(/^(\d{2})(\d)/, "$1.$2");
                value = value.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                value = value.replace(/\.(\d{3})(\d)/, ".$1/$2");
                value = value.replace(/(\d{4})(\d)/, "$1-$2");

                e.target.value = value;
            });

            cnpjInput.addEventListener("keypress", (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });
    </script>
    {% include 'loading.html' %}
</body>

</html>
