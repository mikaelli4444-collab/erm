<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento recusado</title>

  <style>
    :root {
      --error-color: #ef4444;
      --error-bg: #d17a7a;

      --card-background: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;

      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);

      --font-family-display: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --font-family-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      --radius-lg: 0.75rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      background: var(--error-bg);
      font-family: var(--font-family-body);
    }

    .card {
      background: var(--card-background);
      padding: 2rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .icon {
      font-size: 4rem;
      color: var(--error-color);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: var(--font-family-display);
      color: var(--text-primary);
      margin-bottom: 0.8rem;
    }

    p {
      color: var(--text-secondary);
    }

    @media (max-width: 420px) {
      .card {
        width: 100%;
        padding: 1.5rem;
      }

      .icon {
        font-size: 3.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">✖</div>
    <h1>Pagamento recusado</h1>
    <p>Não foi possível processar o pagamento.</p>
  </div>

</body>
</html>
