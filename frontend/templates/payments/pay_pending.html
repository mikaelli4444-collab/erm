<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago Pendiente</title>

  <style>
    :root {
      --primary-color: #4f46e5;
      --primary-light: #6366f1;
      --primary-dark: #4338ca;
      --success-color: #10b981;
      --error-color: #ef4444;
      --background-color: #688db3;
      --card-background: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);

      --font-family-display: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --font-family-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

      --font-size-base: 1rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.875rem;

      --font-weight-medium: 500;
      --font-weight-bold: 700;

      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;

      --radius-lg: 0.75rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--background-color);
      font-family: var(--font-family-body);
      color: var(--text-primary);
    }

    .card {
      background: var(--card-background);
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .icon {
      font-size: 4rem;
      color: var(--primary-color);
      margin-bottom: var(--spacing-md);
    }

    h1 {
      font-family: var(--font-family-display);
      font-size: var(--font-size-2xl);
      margin-bottom: var(--spacing-md);
    }

    p {
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">⏳</div>
    <h1>Pago pendiente</h1>
    <p>Estamos esperando la confirmación del pago.</p>
  </div>

</body>
</html>
